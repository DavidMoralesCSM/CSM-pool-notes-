<!DOCTYPE html>
<html>
<head>

    <title>Customer Success Specialist </title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #121212;
            color: #FFCC00;
            margin: 0;
            padding: 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: linear-gradient(180deg, #1A1A1A 0%, #111 100%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 600;
            color: #FFCC00;
        }
        .divider {
            border-bottom: 1px solid rgba(255, 204, 0, 0.4);
        }
        form {
            max-width: 650px;
            margin: 40px auto;
            background-color: #1E1E1E;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
        }
        label {
            display: block;
            margin-top: 20px;
            font-weight: 600;
            color: #FFCC00;
            font-size: 15px;
        }
        select, input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 204, 0, 0.4);
            border-radius: 12px;
            background-color: #2A2A2A;
            color: #FFCC00;
            font-size: 15px;
            transition: all 0.25s ease;
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border: 1px solid #FFCC00;
            background-color: #262626;
            box-shadow: 0 0 10px rgba(255,204,0,0.3);
        }
        textarea {
            height: 90px;
            resize: vertical;
        }
        button {
            margin-top: 25px;
            padding: 12px 20px;
            font-weight: 600;
            font-size: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-copy {
            background: linear-gradient(180deg, #FFCC00, #e6b800);
            color: #1A1A1A;
            box-shadow: 0 4px 12px rgba(255,204,0,0.4);
        }
        .btn-copy:hover {
            background: linear-gradient(180deg, #FFD633, #e6b800);
            box-shadow: 0 6px 16px rgba(255,204,0,0.5);
        }
        .btn-clear {
            background-color: #2A2A2A;
            color: #FFCC00;
            margin-left: 12px;
            border: 1px solid rgba(255, 204, 0, 0.4);
        }
        .btn-clear:hover {
            background-color: #333;
            border-color: #FFCC00;
        }
    </style>
    <script>
        function copyForm() {
            let form = document.getElementById("notesForm");
            let data = "";
            for (let i = 0; i < form.elements.length; i++) {
                let el = form.elements[i];
                if (el.type !== "button" && el.type !== "submit") {
                    let label = el.getAttribute("data-label");
                    let value = el.value || "";
                    data += (label ? label + ": " : "") + value + "\n";
                }
            }
            navigator.clipboard.writeText(data.trim()).then(() => {
                alert("Form data copied to clipboard!");
            });
        }
        function clearForm() {
            document.getElementById("notesForm").reset();
        }
    </script>
</head>
<body>

<header>
    <h1>Customer Success Specialist </h1>
    <img src="https://res.cloudinary.com/brandpad/image/upload/c_scale,dpr_auto,f_auto,w_768/v1/13080/goto_logo_wht_yellow" alt="GoTo" height="40">
</header>
<div class="divider"></div>

<form id="notesForm">

    <label>Attempt Stage:</label>
    <select data-label="Attempt Stage">
        <option>1ST ATTEMPT</option>
        <option>2ND ATTEMPT</option>
        <option>3RD ATTEMPT</option>
        <option>4TH ATTEMPT</option>
        <option>FOLLOW UP </option>
    </select>

    <label>Contact Name:</label>
    <input type="text" data-label="Contact Name">

    <label>Email:</label>
    <input type="email" data-label="Email">

    <label>Phone Number:</label>
    <input type="tel" data-label="Phone Number">

    <label>Product:</label>
    <select data-label="Product">
        <option>GoToAssist</option>
        <option>GoToMyPC</option>
        <option>PRO</option>
        <option>Central</option>
        <option>Resolve</option>
        <option>Rescue</option>
        <option>Hamachi</option>
    </select>

    <label> Recurring Revenue:</label>
    <input type="text" data-label="Recurring Revenue">

    <label>Renewal Date:</label>
    <input type="date" data-label="Renewal Date">

    <label>Last Usage:</label>
    <input type="text" data-label="Last Usage">

    <label>Project:</label>
    <select data-label="Project">
        <option>CC churn</option>
        <option>Closed Loop - In product</option>
        <option>Closed Loop - Post Purchase</option>
        <option>AWB</option>
        <option>Adyen Migration</option>
        <option>AR turn off</option>
        <option>rNPS</option>
        <option>tNPS</option>
        <option>Inbound Request</option>
        <option>Meeting</option>
    </select>

    <label>Account Hygiene Internal Admin:</label>
    <input type="text" data-label="Account Hygiene Internal Admin">
    
    <label>Account Hygiene AI/Additional findings:</label>
    <textarea data-label="AI/Additional findings"></textarea>

    <label>Contact Outcome/Notes:</label>
    <textarea data-label="Contact Outcome/Notes"></textarea>

    <button type="button" class="btn-copy" onclick="copyForm()">Copy</button>
    <button type="button" class="btn-clear" onclick="clearForm()">Clear</button>
</form>

</body>
</html>
<hr>

<h3>🔗 Salesforce Account Link</h3>

<input type="text" id="sfLink" placeholder="Paste Salesforce Account Link Here" style="width:100%; padding:8px;">

<br>

<button onclick="generateAndCopy()" style="padding:8px 14px; margin-top:10px;">
Generate Full Script
</button>

<button onclick="clearLink()" style="padding:8px 14px; margin-top:10px;">
Clear Link
</button>

<script>

const fullPrompt = `# ✅ PROMPT1 – Account Hygiene (Stable Forensic v1.0)
Act as a **Customer Success Agent performing Account Hygiene – Full Forensic Audit**.
You will be provided with a Salesforce Account link or Account ID.
**ENTER SALESFORCE LINK HERE**

# 🎯 OBJECTIVE
Perform a complete Account Hygiene audit ensuring:
* Accurate Contact retrieval
* Capture of ALL structured phone numbers
* Extraction of hidden phone numbers in Cases & Activities
* Controlled website phone validation
* Low-noise enrichment
* Clean, structured Salesforce-ready output

🎯 Your Task
1️⃣ Review the Full Salesforce Account Record
You MUST query and review the following Salesforce objects and related records:

🔎 REQUIRED SALESFORCE DATA RETRIEVAL (MANDATORY)

A. Account Object
Retrieve:
Company Name
Phone
Alternate phone fields (if any)
Website
All email fields
Description field

B. All Related Contacts
Query ALL Contacts related to the Account and retrieve:
Full Name
Email
Phone
MobilePhone
OtherPhone
Any additional phone fields
Description field

C. 3 Most Recent OPEN Cases
Query the 3 most recent Cases where:
Status ≠ Closed
Sorted by CreatedDate (most recent first)

From each Case retrieve:
Case.Phone
SuppliedPhone
Contact Phone on Case
SuppliedEmail
Description field

D. Case Related Records (For Each of the 3 Cases)
You MUST also retrieve and review:
CaseComments
EmailMessage (email threads)
FeedItems (Case Feed)
Notes (Note and ContentNote objects)

Extract any phone numbers found in:
Email bodies
Signatures
Case descriptions
Internal comments
Notes
Free-text fields

✅ Do NOT stop at structured fields
✅ Scan all free-text content for valid phone numbers

E. Website Review (If Website Exists)
If a website is listed:
Review Contact page
About page
Footer
Extract any listed phone numbers.

🌐 External Search (Required)
Run the following searches:
"[Company Name]"
"[Main Contact Name]" "[Company Name]"
site:linkedin.com "[Company Name]"
"[Email Address]"

Extract only:
Valid phone numbers
Confirmed email matches
Business status indicators (closed, acquired, inactive, rebranded)
Contact changes
Risk indicators

📌 Extract and Report ONLY:
Valid phone numbers (no duplicates)
Confirmed primary email
Main Contact Name
Risk indicators
Data inconsistencies
Missing critical data
Recommended next action

Do NOT include:
Raw case details
Research steps
Query explanations
Irrelevant company data

❗ Output Rules
Do NOT show research steps
Do NOT explain reasoning
Do NOT include raw case details
Only return the formatted Salesforce Note below
If a section has no data, write: "Not Found"

# ✅ OUTPUT FORMAT
Title: Account Hygiene
Contact Name:
Email:
Phone Numbers Found (all numbers found, deduplicated):
Ph# 1 –
Ph# 2 –
Ph# 3 –
Contact Outcome / Notes:
(Brief summary of findings, data gaps, inconsistencies, risk flags, and recommended next action.)
Website Reviewed: Yes / No / No – Access Error
Cases Fully Scanned (CaseComment, EmailMessage, FeedItem, FeedTrackedChange, Note, ContentNote, Task, Event): Yes / No

✅ Stable for non-enterprise accounts
✅ Low-noise enrichment
✅ Dynamic phone-safe
✅ ACR-aware
✅ Reverse-validated website capture`;

function generateAndCopy() {
    let link = document.getElementById("sfLink").value.trim();

    if (!link) {
        alert("Please paste the Salesforce Account link.");
        return;
    }

    let finalScript = fullPrompt.replace("**ENTER SALESFORCE LINK HERE**", link);

    navigator.clipboard.writeText(finalScript)
        .then(() => {
            alert("✅ Full Script copied! You can now paste it.");
        })
        .catch(() => {
            alert("Copy failed. Please copy manually.");
        });
}

function clearLink() {
    document.getElementById("sfLink").value = "";
}

</script>
